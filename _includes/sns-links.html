{% comment %}
    @param {Boolean} center 
{% endcomment %}

{% if include.center %}
<ul class="list-inline text-center">
{% else %}
<ul class="list-inline">
    {% endif %}
    
  
  {% if site.github_username %}
  <li>
    <a target="_blank" href="https://github.com/{{ site.github_username }}">
      <span class="fa-stack fa-lg">
        <i class="fa fa-circle fa-stack-2x"></i>
        <i class="fa fa-github fa-stack-1x fa-inverse"></i>
      </span>
    </a>
  </li>
  {% endif %}
  <!-- 
  <li>
      <a href="https://www.buymeacoffee.com/iamlost.faith"
	 target="_blank">
	  <img src="https://cdn.buymeacoffee.com/buttons/default-orange.png"
	       alt="Buy Me A Coffee"
	       height="41"
	       width="174"
	       style="border-radius:5px; cursor:default"></a>
  </li>
  -->
  {% if site.email %}
  <li>
    <a target="_blank" href="mailto:{{ site.email }}?subject={{ site.title }}" method="post">
      <span class="fa-stack fa-lg">
        <i class="fa fa-circle fa-stack-2x"></i>
        <i class="fa fa-envelope fa-stack-1x fa-inverse"></i>
      </span>
    </a>
  </li>
  {% endif %}
</ul>
